name: CI-CD-GitOps

on:
  push:
    branches:
      - main

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout App Repo
        uses: actions/checkout@v3

      - name: Set Image Tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:$TAG ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:$TAG

      - name: Build & Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:$TAG ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:$TAG

      - name: Clone GitOps Repo
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/praveen0612/ecommerce-gitops.git

      - name: Update Image Tags in Manifests
        run: |
          cd ecommerce-gitops/k8s
          sed -i "s|image: .*backend.*|image: ${{ secrets.DOCKER_USERNAME }}/backend:$TAG|" backend.yaml
          sed -i "s|image: .*frontend.*|image: ${{ secrets.DOCKER_USERNAME }}/frontend:$TAG|" frontend.yaml

      - name: Commit & Push Changes
        run: |
          cd ecommerce-gitops
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Update image tag to $TAG"
          git push